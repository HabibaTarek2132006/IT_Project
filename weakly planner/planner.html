<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="../../component/navbar/nav.css">
<link rel="stylesheet" href="../../component/footer/footer.css">
<title>weekly planner</title>
<link rel="stylesheet" href="planner.css">



</head>

<body>
  
<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container">
  <h2>Weekly Meal Planner</h2>

  <table>
    <tr>
      <th>Day</th>
      <th>Breakfast</th>
      <th>Lunch</th>
      <th>Dinner</th>
    </tr>

    <!-- الأيام -->
    <tr>
      <td>Saturday</td>
      <td><input id="sat-b"></td>
      <td><input id="sat-l"></td>
      <td><input id="sat-d"></td>
    </tr>

    <tr>
      <td>Sunday</td>
      <td><input id="sun-b"></td>
      <td><input id="sun-l"></td>
      <td><input id="sun-d"></td>
    </tr>

    <tr>
      <td>Monday</td>
      <td><input id="mon-b"></td>
      <td><input id="mon-l"></td>
      <td><input id="mon-d"></td>
    </tr>

    <tr>
      <td>Tuesday</td>
      <td><input id="tue-b"></td>
      <td><input id="tue-l"></td>
      <td><input id="tue-d"></td>
    </tr>

    <tr>
      <td>Wednesday</td>
      <td><input id="wed-b"></td>
      <td><input id="wed-l"></td>
      <td><input id="wed-d"></td>
    </tr>

    <tr>
      <td>Thursday</td>
      <td><input id="thu-b"></td>
      <td><input id="thu-l"></td>
      <td><input id="thu-d"></td>
    </tr>

    <tr>
      <td>Friday</td>
      <td><input id="fri-b"></td>
      <td><input id="fri-l"></td>
      <td><input id="fri-d"></td>
    </tr>

  </table>
  
<button onclick="savePlan()">Save Plan</button>
<button onclick="clearPlan()">Clear Plan</button>
</div>




<!-- FOOTER -->
<div id="footer"></div>

<script>
 
// 🔄 تحميل تلقائي عند فتح الصفحة
window.onload = function () {
  loadPlan();
};

// 💾 Save Plan
function savePlan() {
  const inputs = document.querySelectorAll("input");

  inputs.forEach(input => {
    localStorage.setItem(input.id, input.value);
  });

  alert("Saved successfully ✅");
}

// 🔄 Load Plan (تلقائي + يدوي لو حبيتي)
function loadPlan() {
  const inputs = document.querySelectorAll("input");

  inputs.forEach(input => {
    input.value = localStorage.getItem(input.id) || "";
  });
}

// 🧹 Clear Plan (جديد)
function clearPlan() {
  const inputs = document.querySelectorAll("input");

  inputs.forEach(input => {
    input.value = "";
    localStorage.removeItem(input.id);
  });

  alert("Plan cleared 🧹");
}
// تحميل تلقائي أول ما الصفحة تفتح
window.onload = loadPlan;
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
