<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Vegetable Recipes</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../../component/navbar/nav.css">
  <link rel="stylesheet" href="../../component/footer/footer.css">
  <link rel="stylesheet" href="Vegetables.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<h1 class="title">🥦 Vegetable Recipes</h1>

<div class="container">

  <!-- ================= CARD ================= -->
  <div class="card">
    <img src="../../photo/Moussaka.jpg" alt="Moussaka">

    <div class="content">
      <h2>Moussaka</h2>

      <p><b>Ingredients:</b></p>
      <ul>
        <li>Eggplant - 2 large</li>
        <li>Ground beef - 300g</li>
        <li>Onion - 1</li>
        <li>Garlic - 3 cloves</li>
        <li>Tomato sauce - 2 cups</li>
        <li>Tomato paste - 1 tbsp</li>
        <li>Green pepper (optional)</li>
        <li>Salt - to taste</li>
        <li>Black pepper - 1/2 tsp</li>
        <li>Cumin - 1 tsp</li>
        <li>Oil</li>
      </ul>

      <!-- ✅ زر الإضافة -->
      <button class="add-btn" onclick="addRecipe(
        'Moussaka',
        '../../photo/Moussaka.jpg',
        [
          'Eggplant - 2 large',
          'Ground beef - 300g',
          'Onion - 1',
          'Garlic - 3 cloves',
          'Tomato sauce - 2 cups',
          'Tomato paste - 1 tbsp',
          'Green pepper (optional)',
          'Salt - to taste',
          'Black pepper - 1/2 tsp',
          'Cumin - 1 tsp',
          'Oil'
        ]
      )">
        🛒 Add
      </button>

    </div>
  </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- NAV + FOOTER -->
<script>
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

<!-- 🛒 GROCERY SYSTEM -->
<script>
function addRecipe(name, img, ingredients) {
    let grocery = JSON.parse(localStorage.getItem("grocery")) || [];

    grocery.push({
        name: name,
        img: img,
        ingredients: ingredients
    });

    localStorage.setItem("grocery", JSON.stringify(grocery));

    alert(name + " added to Grocery 🛒");
}
</script>

</body>
</html>
