<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fish Recipes</title>

  <link rel="stylesheet" href="../../component/navbar/nav.css">
  <link rel="stylesheet" href="../../component/footer/footer.css">
  <link rel="stylesheet" href="Fish.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<h1 class="title">Fish Recipes</h1>

<div class="container">

  <!-- ================= CARD ================= -->
  <div class="card">
    <img src="../../photo/Chrimp ricztto.jpg" alt="Fish">

    <div class="content">
      <h2>Fish Recipe</h2>

      <p><b>Ingredients:</b></p>
      <ul>
        <li>Fish fillet - 500g</li>
        <li>Lemon juice - 2 tbsp</li>
        <li>Garlic - 3 cloves</li>
        <li>Olive oil - 2 tbsp</li>
        <li>Salt - to taste</li>
        <li>Black pepper - 1 tsp</li>
      </ul>

      <!-- ✅ زر الإضافة -->
      <button class="add-btn" onclick="addRecipe(
        'Fish Recipe',
        '../../photo/Chrimp ricztto.jpg',
        [
          'Fish fillet - 500g',
          'Lemon juice - 2 tbsp',
          'Garlic - 3 cloves',
          'Olive oil - 2 tbsp',
          'Salt - to taste',
          'Black pepper - 1 tsp'
        ]
      )">
        🛒 Add
      </button>

    </div>
  </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

<!-- 🛒 GROCERY SYSTEM (مهم جدًا) -->
<script>
function addRecipe(name, img, ingredients) {
    let grocery = JSON.parse(localStorage.getItem("grocery")) || [];

    grocery.push({
        name: name,
        img: img,
        ingredients: ingredients
    });

    localStorage.setItem("grocery", JSON.stringify(grocery));

    alert(name + " added to Grocery 🛒");
}
</script>

</body>
</html>
