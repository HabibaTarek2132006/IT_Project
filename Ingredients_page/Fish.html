<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fish Recipes</title>

  <link rel="stylesheet" href="../../component/navbar/nav.css">
  <link rel="stylesheet" href="../../component/footer/footer.css">
  <link rel="stylesheet" href="Fish.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<h1 class="title">Fish Recipes</h1>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <img src="/photo/Chrimp ricztto.jpg" alt="fish">

    <div class="content">
      <h2>Fish Recipe</h2>

      <p><b>Ingredients:</b></p>
      <ul>
        <li>Fish fillet - 500g</li>
        <li>Lemon juice - 2 tbsp</li>
        <li>Garlic - 3 cloves</li>
        <li>Olive oil - 2 tbsp</li>
        <li>Salt - to taste</li>
        <li>Black pepper - 1 tsp</li>
      </ul>

    </div>
  </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
