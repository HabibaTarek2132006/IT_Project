<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="../../component/navbar/nav.css">
  <link rel="stylesheet" href="../../component/footer/footer.css">
  <link rel="stylesheet" href="ing.css">

  <title>Ingredients Calculator</title>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container">

  <h2>Ingredients Calculator 🍲</h2>

  <!-- Recipe Name -->
  <input type="text" id="name" placeholder="Recipe Name">

  <!-- Country -->
  <select id="country">
    <option value="Egypt">Egypt</option>
    <option value="Italy">Italy</option>
    <option value="USA">USA</option>
    <option value="India">India</option>
  </select>

  <!-- Ingredients -->
  <textarea id="input" placeholder="Write ingredients:
1 cup rice
2 eggs
200 g chicken"></textarea>

  <!-- People -->
  <input type="number" id="people" value="2" min="1">

  <button onclick="loadRecipe()">Calculate</button>

  <hr>

  <h3 id="title"></h3>
  <p id="countryText"></p>

  <ul id="output"></ul>

</div>
<!-- 🔹 FOOTER -->
<div id="footer"></div>

<script src="ing.js"></script>




</body>
</html>
