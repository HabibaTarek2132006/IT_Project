<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="../../component/navbar/nav.css">
<link rel="stylesheet" href="../../component/footer/footer.css">
<title>Admin Dashboard</title>




<style>

body {
  font-family: Arial;
  background: #f3f3f3;
  text-align: center;
  padding: 30px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 400px;
  margin: auto;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}


input {
  width: 90%;
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.add {
  background: #4CAF50;
  color: white;
}

.delete {
  background: red;
  color: white;
}

ul {
  list-style: none;
  padding: 0;
}


</style>


</head>

<body>
    <!-- NAVBAR -->
<div id="navbar"></div>


<div class="container">
  <h2>Admin Dashboard</h2>

  <!-- إضافة وصفة -->
  <input type="text" id="recipeName" placeholder="Recipe name">
  <button class="add" onclick="addRecipe()">Add Recipe</button>

  <h3>Recipes List</h3>
  <ul id="recipeList"></ul>
</div>




<!-- FOOTER -->
<div id="footer"></div>

<script>
    let recipes = JSON.parse(localStorage.getItem("recipes")) || [];

// عرض الوصفات
function displayRecipes() {
  let list = document.getElementById("recipeList");
  list.innerHTML = "";

  recipes.forEach((recipe, index) => {
    list.innerHTML += `
      <li>
        ${recipe}
        <button class="delete" onclick="deleteRecipe(${index})">Delete</button>
      </li>
    `;
  });
}

// إضافة وصفة
function addRecipe() {
  let input = document.getElementById("recipeName");

  if (input.value.trim() === "") return;

  recipes.push(input.value);
  localStorage.setItem("recipes", JSON.stringify(recipes));

  input.value = "";
  displayRecipes();
}

// حذف وصفة
function deleteRecipe(index) {
  recipes.splice(index, 1);
  localStorage.setItem("recipes", JSON.stringify(recipes));
  displayRecipes();
}

// تحميل أولي
displayRecipes();
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
