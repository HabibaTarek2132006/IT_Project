<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="../../component/navbar/nav.css">
<link rel="stylesheet" href="../../component/footer/footer.css">

  <title>Chickens Recipes</title>

  <link rel="stylesheet" href="Compare.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<h1 class="title">🍽️ Compare Dishes</h1>

<div class="input-card">
  <select id="dish1"></select>
  <select id="dish2"></select>
  <button onclick="compare()">Compare</button>
</div>

<div id="result" class="result-container"></div>

<script src="Compare.js"></script>

<div id="footer"></div>

<script>
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
</body>
</html>
