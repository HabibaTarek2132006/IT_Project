<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Indian Food</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- CSS -->
  <link rel="stylesheet" href="../../component/navbar/nav.css">
  <link rel="stylesheet" href="../../component/footer/footer.css">
  <link rel="stylesheet" href="indian.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<h1 class="title">🇮🇳 Indian Food</h1>

<div class="container">

  <div class="card butter-chicken">
    <h3>Butter Chicken</h3>

    <button class="save-btn" onclick="addBookmark('Butter Chicken', 'Indian', '🍛')">
      ❤️ Save
    </button>
  </div>

  <div class="card tikka-masala">
    <h3>Chicken Tikka Masala</h3>

    <button class="save-btn" onclick="addBookmark('Chicken Tikka Masala', 'Indian', '🍛')">
      ❤️ Save
    </button>
  </div>

  <div class="card biryani">
    <h3>Biryani</h3>

    <button class="save-btn" onclick="addBookmark('Biryani', 'Indian', '🍛')">
      ❤️ Save
    </button>
  </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS LOAD -->
<script>
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });


// ⭐ Bookmark function
function addBookmark(name, from, icon) {
  let bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];

  bookmarks.push({ name, from, icon });

  localStorage.setItem("bookmarks", JSON.stringify(bookmarks));

  alert("Saved ❤️");
}
</script>

</body>
</html>
