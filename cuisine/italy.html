<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="../../component/navbar/nav.css">
<link rel="stylesheet" href="../../component/footer/footer.css">
 
<link rel="stylesheet" href="italy.css"
<body>
<div id="navbar"></div>
<h1 class="title">🇮🇹 Italian Food</h1>

<div class="container">

  <div class="card">
    <h3>Pizza</h3>
  </div>

  <div class="card">
    <h3>Lasagna</h3>
  </div>

  <div class="card">
    <h3>Pasta Alfredo</h3>
  </div>

  <div class="card">
    <h3>Tiramisu</h3>
  </div>

  <div class="card">
    <h3>Risotto</h3>
  </div>

</div>


<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("../../component/navbar/nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

fetch("../../component/footer/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
