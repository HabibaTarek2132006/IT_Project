<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact & Live Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="contact.css">
</head>

<body>

<!-- 🔙 BACK BUTTON -->
<a href="/index.html" class="back-btn">← Back Home</a>

<h1 class="title">📞 Contact & 💬 Live Chat</h1>

<div class="container">

  <!-- CONTACT -->
  <div class="card contact-box">

    <h2>Contact Us</h2>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>

    <button>Send Message</button>

    <!-- REAL CONTACT OPTIONS -->
    <div class="real-contact">

      <h3>Or contact us directly:</h3>

      <a class="contact-option email"
         href="mailto:support@cookhub.com?subject=Contact from CookHub">
         📧 Send Email
      </a>

      <a class="contact-option whatsapp"
         href="https://wa.me/201000000000"
         target="_blank">
         💬 Chat on WhatsApp
      </a>

    </div>

  </div>

  <!-- CHAT -->
  <div class="card chat-box">

    <h2>Live Chat</h2>

    <div class="chat-messages">
      <p class="bot">👋 Hello! How can I help you?</p>
    </div>

    <div class="chat-input">
      <input type="text" placeholder="Type message...">
      <button>Send</button>
    </div>

  </div>

</div>

</body>
</html>
